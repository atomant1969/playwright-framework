name: Playwright Framework Checks

on:
  push:
    branches: [main, canary]
  pull_request:
    branches: [main, canary]
  workflow_dispatch:
    inputs:
      test_suite_override:
        description: Optional suite key override. Leave blank to use .env/framework.config.ts.
        required: false
        default: ''
      parallel_suite_keys_override:
        description: Optional comma-separated suite key override. Leave blank to use .env/framework.config.ts.
        required: false
        default: ''

jobs:
  select-suites:
    name: select-suites
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      suite_matrix: ${{ steps.matrix.outputs.suite_matrix }}
      suite_count: ${{ steps.matrix.outputs.suite_count }}
    env:
      TEST_SUITE_OVERRIDE: ${{ inputs.test_suite_override || '' }}
      PARALLEL_SUITE_KEYS_OVERRIDE: ${{ inputs.parallel_suite_keys_override || '' }}
      HEADLESS: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Framework doctor
        run: pnpm doctor
      - name: Typecheck
        run: pnpm typecheck
      - name: Apply workflow overrides
        shell: bash
        run: |
          if [ -n "$TEST_SUITE_OVERRIDE" ]; then
            echo "TEST_SUITE=$TEST_SUITE_OVERRIDE" >> "$GITHUB_ENV"
          fi
          if [ -n "$PARALLEL_SUITE_KEYS_OVERRIDE" ]; then
            echo "PARALLEL_SUITE_KEYS=$PARALLEL_SUITE_KEYS_OVERRIDE" >> "$GITHUB_ENV"
          fi
      - name: Show workflow inputs
        run: |
          echo "TEST_SUITE=${TEST_SUITE:-<from config>}"
          echo "PARALLEL_SUITE_KEYS=${PARALLEL_SUITE_KEYS:-<from config>}"
          echo "TEST_SUITE_OVERRIDE=${TEST_SUITE_OVERRIDE:-<none>}"
          echo "PARALLEL_SUITE_KEYS_OVERRIDE=${PARALLEL_SUITE_KEYS_OVERRIDE:-<none>}"
      - name: Validate suite registry
        run: pnpm validate:suites
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Generate suite matrix
        id: matrix
        run: pnpm matrix
      - uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: suite-matrix
          path: test-results/suite-matrix.*
          if-no-files-found: error
          retention-days: 30

  run-suite:
    name: suite ${{ matrix.order }} - ${{ matrix.suite }} [${{ matrix.mode }}, ${{ matrix.workers }} workers]
    needs: select-suites
    if: ${{ needs.select-suites.outputs.suite_count != '0' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-suites.outputs.suite_matrix) }}
    env:
      TEST_SUITE: ${{ matrix.suite }}
      PLAYWRIGHT_WORKERS: ${{ matrix.workers }}
      HEADLESS: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Show selected suite
        run: |
          echo "Suite: ${{ matrix.suite }}"
          echo "Kind: ${{ matrix.kind }}"
          echo "Mode: ${{ matrix.mode }}"
          echo "Workers: ${{ matrix.workers }}"
          echo "Description: ${{ matrix.description }}"
      - name: Generate suite test summary
        run: pnpm suite:summary
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Run suite ${{ matrix.suite }}
        run: pnpm test
      - name: Generate suite result summary
        if: ${{ always() }}
        run: pnpm suite:results
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30
